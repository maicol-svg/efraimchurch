<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missione Kenya | Ci siamo trasferiti su Efraim Church</title>
  <meta name="description" content="Il sito Missione Kenya si è trasferito. Visita efraimchurch.com per tutte le informazioni sulla missione in Kenya della Chiesa Cristiana Efraim." />
  <link rel="canonical" href="https://efraimchurch.com/missioni/kenya/" />
  <meta property="og:title" content="Missione Kenya | Ci siamo trasferiti su Efraim Church" />
  <meta property="og:description" content="Il sito Missione Kenya è ora parte di Efraim Church. Visita il nuovo sito per tutte le informazioni." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://efraimchurch.com/missioni/kenya/" />
  <meta http-equiv="refresh" content="8;url=https://efraimchurch.com/missioni/kenya/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep: #0F2E14;
      --green-dark: #1B5E20;
      --green: #2E7D32;
      --gold: #D4A843;
      --gold-dark: #B8912E;
      --gold-pale: #E8D5A0;
      --cream: #FDF8F0;
      --text-light: rgba(253, 248, 240, 0.85);
      --text-muted: rgba(253, 248, 240, 0.45);
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--green-deep);
      font-family: 'Nunito', sans-serif;
      color: var(--text-light);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
      mix-blend-mode: overlay;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(100px);
    }
    .bg-orb--1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(46, 125, 50, 0.15) 0%, transparent 70%);
      top: -200px; right: -150px;
    }
    .bg-orb--2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(212, 168, 67, 0.08) 0%, transparent 70%);
      bottom: -100px; left: -100px;
    }
    .bg-orb--3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(46, 125, 50, 0.1) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .line-v {
      position: fixed;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(212, 168, 67, 0.12), transparent);
      top: 0; bottom: 0;
      pointer-events: none;
    }
    .line-v--1 { left: 15%; }
    .line-v--2 { right: 15%; }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 640px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .cross {
      width: 44px;
      height: 44px;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }
    .cross svg { width: 100%; height: 100%; }

    .brand {
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
    }
    .brand-name {
      font-family: 'Lora', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .brand-sub {
      font-family: 'Lora', serif;
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 400;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-top: 0.3rem;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: var(--gold);
      margin: 2rem auto;
      opacity: 0;
      animation: widen 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .message {
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }
    .message h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    .message p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-light);
      max-width: 460px;
      margin: 0 auto;
    }

    .cta {
      margin-top: 2rem;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.75s forwards;
    }
    .cta-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--green-deep);
      background: var(--gold);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 24px rgba(212, 168, 67, 0.25);
    }
    .cta-btn:hover {
      background: var(--gold-pale);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(212, 168, 67, 0.35);
    }
    .cta-btn:active {
      transform: translateY(0);
    }

    .countdown {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    .info {
      margin-top: 2.5rem;
      padding: 1.75rem 2rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 168, 67, 0.12);
      border-radius: 16px;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }
    .info-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 0.75rem;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-row svg { width: 15px; height: 15px; color: var(--gold); flex-shrink: 0; }
    .info-row a { color: var(--text-light); text-decoration: none; transition: color 0.3s; }
    .info-row a:hover { color: var(--gold); }

    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes widen {
      from { opacity: 0; width: 0; }
      to   { opacity: 0.5; width: 50px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="line-v line-v--1"></div>
  <div class="line-v line-v--2"></div>

  <div class="container">
    <div class="cross">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4L24 44" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 18L38 18" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
        <circle cx="24" cy="18" r="7" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.3"/>
      </svg>
    </div>

    <div class="brand">
      <div class="brand-name">EFRAIM</div>
      <div class="brand-sub">church</div>
    </div>

    <div class="divider"></div>

    <div class="message">
      <h1>Ci siamo trasferiti!</h1>
      <p>Il sito Missione Kenya è ora parte di Efraim Church.<br>Tutti i contenuti sono disponibili sul nuovo sito.</p>
    </div>

    <div class="cta">
      <a href="https://efraimchurch.com/missioni/kenya/" class="cta-btn">Vai al nuovo sito</a>
    </div>

    <div class="countdown">
      Sarai reindirizzato automaticamente tra <span id="seconds">8</span> secondi...
    </div>

    <div class="info">
      <div class="info-label">Contatti</div>
      <div class="info-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <a href="mailto:info@missionekenya.com">info@missionekenya.com</a>
      </div>
    </div>

    <div class="footer">Chiesa Cristiana Efraim &middot; Messina</div>
  </div>

  <script>
    (function () {
      var remaining = 8;
      var el = document.getElementById('seconds');
      var interval = setInterval(function () {
        remaining--;
        if (remaining <= 0) {
          clearInterval(interval);
          el.textContent = '0';
          window.location.href = 'https://efraimchurch.com/missioni/kenya/';
        } else {
          el.textContent = remaining;
        }
      }, 1000);
    })();
  </script>
</body>
</html>
